<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Date? ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
</head>
<body>

    <div class="envlope-wrapper">
        <div id="envelope" class="close">
            <div class="front flap"></div>
            <div class="front pocket"></div>
            
            <div class="letter">
                <div class="words line1">To: Crush</div>
                <div class="words line2">Dear crush, you are so beautiful</div>
                <div class="words line3">That every time I see you</div>
                <div class="words line4">my world stops.</div>
                <div class="words line5">You are so supercalifragilisticexpialidocious,</div>
                <div class="words line6">so just to steal your heart,</div>
                <div class="words line7">Will you help me on stealing your heart?</div>
            </div>
            
            <div class="hearts">
                <div class="heart a1"></div>
                <div class="heart a2"></div>
                <div class="heart a3"></div>
            </div>
        </div>
    </div>
    
    <div class="reset">
        <button id="open">Open</button>
        <button id="reset">Close</button>
    </div>

    <div class="content-wrapper">
        <img id="main-gif" src="https://media.tenor.com/ef30B62_N10AAAAi/mochi-peach.gif" alt="Cute begging cat">
        <h1 id="main-text">Will you be my Second Date? 🥺</h1>
        <div class="buttons">
            <button id="yes-btn">Yes!</button>
            <button id="no-btn">No</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
